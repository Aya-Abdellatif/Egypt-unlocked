<div class="map-container">
  <!-- Welcome message -->
  <div *ngIf="userName" class="welcome-message" style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; z-index: 1000;">
    <h3>Welcome, {{ userName }}!</h3>
    <p>City: {{ selectedCity }} | Activity: {{ selectedActivity }}</p>
  </div>

  <img src="assets/images/egypt-map.jpg" class="map-image" alt="Map" />

  <!-- Loading indicator -->
  <div *ngIf="loading" class="loading-overlay">
    <div class="loading-spinner">Loading locations...</div>
  </div>

  <!-- Error message -->
  <div *ngIf="error && !loading" class="error-overlay">
    <div class="error-message">
      <p>{{ error }}</p>
      <button (click)="refreshLocations()" class="retry-button">Retry</button>
    </div>
  </div>



  <!-- Location markers -->
  <div
    *ngFor="let location of locations; let i = index"
    class="location-marker"
    [style.left.%]="getRandomNumber()"
    [style.top.%]="getRandomNumber()"
    (click)="selectLocation(location)"
    [title]="location.name"
  >
    <span style="color: white; font-weight: bold; font-size: 16px;">📍</span>
  </div>

</div>

<div *ngIf="selectedLocation" class="info-popup">
  <img
    src="assets/gif/close.png" class="close-btn" alt="Close" (click)="closeInfo()"
  />
  <br>
  <div class="popup-content">
    <h2>{{ selectedLocation.name }}</h2>
    <p><strong>Type:</strong> {{ selectedLocation.type }}</p>
         <p><strong>Status:</strong> {{ selectedLocation.crowdness }}</p>
     <button
       *ngIf="selectedLocation.crowdness === 'Crowded' && subscribed"
       (click)="accessExclusiveContent(selectedLocation)"
       class="action-button"
     >
       Hidden Experience
     </button>

     <p *ngIf="selectedLocation.crowdness === 'Crowded' && !subscribed" style="color: red;">
       Only available for subscribed users
     </p>

    <button (click)="redeemCoins(selectedLocation)" class="redeem-button">
      Redeem Coins
    </button>
  </div>
</div>
